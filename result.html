<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Lấy Mã UDID</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #0071e3;
        }
        p {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 25px;
        }
        .udid-box {
            background-color: #f5f5f7;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 15px;
            word-break: break-all;
            border: 1px solid #d2d2d7;
            color: #1d1d1f;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-copy {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-copy:hover {
            background-color: #0077ed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Thành Công!</h1>
    <p>Mã định danh UDID của thiết bị của bạn là:</p>
    
    <div class="udid-box" id="udidDisplay">Đang tải...</div>
    
    <button class="btn-copy" onclick="copyUDID()">Sao chép UDID</button>
</div>

<script>
    // Hàm tự động bóc tách tham số ?udid= trên đường dẫn URL
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    const udid = getQueryParam('udid');
    
    if (udid) {
        document.getElementById('udidDisplay').innerText = udid;
    } else {
        document.getElementById('udidDisplay').innerText = "Không tìm thấy mã UDID. Vui lòng thử lại.";
        document.getElementById('udidDisplay').style.color = "red";
    }

    // Hàm sao chép nhanh
    function copyUDID() {
        if (!udid) return;
        navigator.clipboard.writeText(udid).then(() => {
            alert("Đã sao chép mã UDID vào bộ nhớ tạm!");
        }).catch(err => {
            alert("Lỗi sao chép, bạn hãy tự bôi đen để copy nhé.");
        });
    }
</script>

</body>
</html>
