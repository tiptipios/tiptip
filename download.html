<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download - Tip Tip</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f0a1e 0%, #1a0b2e 25%, #2d1b3d 50%, #1e0f3b 75%, #0a0614 100%);
            background-size: 400% 400%;
            animation: gradient-flow 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradient-flow {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float-orb linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.5), transparent 70%);
            top: -10%;
            left: -10%;
            animation-duration: 20s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(219, 39, 119, 0.4), transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-duration: 25s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.35), transparent 70%);
            top: 50%;
            right: 10%;
            animation-duration: 18s;
        }

        @keyframes float-orb {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(30px, -30px);
            }

            66% {
                transform: translate(-20px, 20px);
            }
        }

        /* Container */
        .download-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.1),
                    rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 50px 100px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(124, 58, 237, 0.3);
            animation: card-entrance 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes card-entrance {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Card glow */
        .download-container::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(45deg,
                    rgba(124, 58, 237, 0.5),
                    rgba(219, 39, 119, 0.5),
                    rgba(59, 130, 246, 0.5));
            border-radius: 32px;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.6;
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 0.8;
            }
        }

        /* Game Info */
        .game-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-icon {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0 auto 20px;
            display: block;
            animation: icon-bounce 2s ease-in-out infinite;
        }

        @keyframes icon-bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .game-title {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 12px rgba(124, 58, 237, 0.6);
            background: linear-gradient(135deg, #fff, #e0d4ff, #ffd4e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .meta-item i {
            color: rgba(167, 139, 250, 0.9);
        }

        /* Countdown Section */
        .countdown-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .countdown-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .countdown-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .countdown-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(124, 58, 237, 0.8);
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(124, 58, 237, 0.9),
                    rgba(219, 39, 119, 0.9));
            border-radius: 10px;
            transition: width 1s linear;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.8);
        }

        .download-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg,
                    rgba(124, 58, 237, 0.8),
                    rgba(91, 33, 182, 0.7));
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow:
                0 10px 30px rgba(124, 58, 237, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: button-appear 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        @keyframes button-appear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .download-btn.show {
            display: flex;
        }

        .download-btn:hover:not([style*="pointer-events: none"]) {
            transform: translateY(-3px);
            box-shadow:
                0 15px 40px rgba(124, 58, 237, 0.6),
                0 0 60px rgba(124, 58, 237, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        .download-btn:active:not([style*="pointer-events: none"]) {
            transform: translateY(-1px);
        }

        .download-btn i {
            font-size: 20px;
        }

        .download-btn.unlocked {
            background: linear-gradient(135deg,
                    rgba(34, 197, 94, 0.8),
                    rgba(22, 163, 74, 0.7));
            opacity: 1 !important;
            pointer-events: auto !important;
            box-shadow:
                0 10px 30px rgba(34, 197, 94, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .download-btn.unlocked:hover {
            box-shadow:
                0 15px 40px rgba(34, 197, 94, 0.6),
                0 0 60px rgba(34, 197, 94, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        /* Features Section */
        .features-section {
            margin-top: 30px;
        }

        .features-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(124, 58, 237, 0.5);
        }

        .features-list {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .features-list::-webkit-scrollbar {
            width: 6px;
        }

        .features-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .features-list::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.5);
            border-radius: 10px;
        }

        .features-list::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 58, 237, 0.7);
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(124, 58, 237, 0.4);
            transform: translateX(5px);
        }

        .feature-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .feature-icon i {
            color: rgba(124, 58, 237, 0.9);
            font-size: 14px;
        }

        .feature-text {
            flex: 1;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
        }

        /* Note */
        .note {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 200, 100, 0.1);
            border: 1px solid rgba(255, 200, 100, 0.3);
            border-radius: 16px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            line-height: 1.6;
        }

        .note i {
            color: rgba(255, 200, 100, 0.9);
            margin-right: 6px;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 9999;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-3px);
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <a href="profilenew.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="download-container">
        <!-- Game Info -->
        <div class="game-info">
            <img id="gameIcon" class="game-icon" src="" alt="Game Icon">
            <h1 id="gameTitle" class="game-title">Loading...</h1>
            <div class="game-meta">
                <div class="meta-item">
                    <i class="fas fa-code-branch"></i>
                    <span id="gameVersion">-</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-hdd"></i>
                    <span id="gameSize">-</span>
                </div>
            </div>
        </div>

        <!-- Unlock Button -->
        <button id="unlockBtn" class="download-btn show">
            <i class="fas fa-lock"></i>
            <span>Unlock Download</span>
        </button>

        <!-- Download Button (Initially Hidden and Disabled) -->
        <a id="downloadBtn" class="download-btn" href="#" style="display: none; opacity: 0.5; pointer-events: none;">
            <i class="fas fa-download"></i>
            <span>Download Now</span>
        </a>

        <!-- Features Section -->
        <div class="features-section" id="featuresSection" style="display: none;">
            <h2 class="features-title">Hack Features:</h2>
            <div class="features-list" id="featuresList">
                <!-- Features will be inserted here -->
            </div>
        </div>

        <!-- Note -->
        <div class="note">
            <i class="fas fa-info-circle"></i>
            If the link is overloaded, please log in to Google Drive on Safari
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const gameTitle = urlParams.get('title') || 'Game';
        const gameImage = urlParams.get('image') || '';
        const gameVersion = urlParams.get('version') || 'Unknown';
        const gameSize = urlParams.get('size') || 'Unknown';
        const downloadUrl = urlParams.get('url') || '#';
        const description = urlParams.get('description') || '';

        // Set game info
        document.getElementById('gameTitle').textContent = gameTitle;
        document.getElementById('gameIcon').src = gameImage;
        document.getElementById('gameVersion').textContent = `v${gameVersion}`;
        document.getElementById('gameSize').textContent = gameSize;
        document.getElementById('downloadBtn').href = downloadUrl;

        // Parse and display features
        if (description) {
            const featuresSection = document.getElementById('featuresSection');
            const featuresList = document.getElementById('featuresList');

            // Split by newlines and filter out empty lines
            const features = description.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0 && line.startsWith('✅'));

            if (features.length > 0) {
                featuresSection.style.display = 'block';

                features.forEach(feature => {
                    const featureText = feature.replace('✅', '').trim();
                    const featureItem = document.createElement('div');
                    featureItem.className = 'feature-item';
                    featureItem.innerHTML = `
                        <div class="feature-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="feature-text">${featureText}</div>
                    `;
                    featuresList.appendChild(featureItem);
                });
            }
        }

        // Countdown logic removed - using unlock button instead
        const unlockBtn = document.getElementById('unlockBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // Handle image error
        document.getElementById('gameIcon').onerror = function () {
            this.src = 'https://via.placeholder.com/100/7c3aed/ffffff?text=Game';
        };

        // Handle unlock button click
        unlockBtn.addEventListener('click', function (e) {
            e.preventDefault();

            // Disable unlock button
            unlockBtn.style.opacity = '0.5';
            unlockBtn.style.pointerEvents = 'none';
            unlockBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Loading ads...</span>';

            // Open advertisement link in new tab
            window.open('https://s.shopee.vn/7VELJqmITK', '_blank');

            // After 1 second, unlock the download button
            setTimeout(function () {
                // Hide unlock button
                unlockBtn.style.display = 'none';

                // Show and enable download button
                downloadBtn.style.display = 'flex';
                downloadBtn.classList.add('unlocked');
                downloadBtn.style.opacity = '1';
                downloadBtn.style.pointerEvents = 'auto';
                downloadBtn.innerHTML = '<i class="fas fa-unlock"></i><span>Download Now</span>';
            }, 1000);
        });

        // Handle download button click
        downloadBtn.addEventListener('click', function (e) {
            e.preventDefault();

            // Redirect to vuotlink with encoded download URL
            window.location.href = 'https://vuotlink.net/st?api=4e2b672bf2a8ba8ead742b4f9c07db7e690505a2&url=' + encodeURIComponent(downloadUrl);
        });
    </script>
</body>

</html>
